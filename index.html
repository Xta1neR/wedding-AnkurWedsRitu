<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankur & Ritu Wedding Invitation</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@400;500;600&family=Yatra+One&display=swap"
        rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- ==========================================
         SECTION 0: ENVELOPE GATE
         ========================================== -->
    <div id="envelope-gate" class="envelope-gate">
        <div class="envelope-flap left-flap" id="flap-left"></div>
        <div class="envelope-flap right-flap" id="flap-right"></div>
        <div class="gate-content" id="gate-content">
            <h1 class="gate-title">You are invited</h1>
            <h2 class="gate-names">Ritu Weds Ankur</h2>

            <button id="wax-seal-btn" class="wax-seal-btn">
                <span>R&A</span>
            </button>
            <p class="click-to-open">Tap seal to open</p>
        </div>
    </div>

    <!-- ==========================================
         SECTION 1: THE LOADER
         ========================================== -->
    <div id="loader" class="loader-screen">
        <div class="loader-content">
            <img src="images/ganesha.png" alt="Ganesha" class="ganesha-loader-img">
            <h1 class="devanagari-gold">ॐ गणेशाय नमः</h1>
        </div>
    </div>

    <!-- ==========================================
         MAIN SCROLL CONTENT (SINGLE PAGE COMPONENTS)
         ========================================== -->
    <div class="content-scroll-layer" id="smooth-wrapper">
        <div id="smooth-content">
            <div id="comp-hero"></div>
            <div id="comp-story"></div>
            <div id="comp-families"></div>
            <div id="comp-event"></div>
            <div id="comp-venue"></div>
            <div id="comp-footer"></div>
        </div>
    </div>

    <!-- Floating Audio Control Removed as per user request -->

    <!-- User must put audio/bg_music.mp3 in folder -->
    <audio id="bg-audio" loop preload="auto">
        <source src="audio/bg-audio.mp3" type="audio/mpeg">
    </audio>

    <!-- GSAP Libraries for highly polished animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script src="script.js"></script>
</body>

</html>
